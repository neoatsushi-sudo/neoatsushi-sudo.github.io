<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" fill="#080a10"/>
  <!-- Screen representation -->
  <rect x="60" y="40" width="200" height="130" rx="8" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.2"/>
  <rect x="70" y="50" width="180" height="110" rx="4" fill="#38bdf8" opacity="0.02"/>
  <!-- Screen content lines -->
  <g opacity="0.1">
    <rect x="80" y="65" width="60" height="4" rx="2" fill="#38bdf8"/>
    <rect x="80" y="78" width="100" height="4" rx="2" fill="#38bdf8"/>
    <rect x="80" y="91" width="80" height="4" rx="2" fill="#38bdf8"/>
    <rect x="80" y="104" width="120" height="4" rx="2" fill="#38bdf8"/>
    <rect x="80" y="117" width="70" height="4" rx="2" fill="#38bdf8"/>
  </g>
  <!-- Vision scan lines -->
  <line x1="260" y1="60" x2="290" y2="80" stroke="#38bdf8" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 3"/>
  <line x1="260" y1="100" x2="290" y2="100" stroke="#38bdf8" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 3"/>
  <line x1="260" y1="140" x2="290" y2="120" stroke="#38bdf8" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 3"/>
  <!-- AI eye -->
  <circle cx="310" cy="100" r="24" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.25"/>
  <circle cx="310" cy="100" r="8" fill="#38bdf8" opacity="0.15"/>
  <circle cx="310" cy="100" r="3" fill="#38bdf8" opacity="0.4"/>
  <!-- Speech output -->
  <g opacity="0.4">
    <rect x="280" y="145" width="90" height="24" rx="8" fill="#38bdf8" opacity="0.08"/>
    <text x="325" y="161" font-family="sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle" opacity="0.5">VOICEVOX</text>
    <!-- Sound waves -->
    <path d="M340,180 Q345,175 345,185" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" fill="none"/>
    <path d="M348,177 Q355,172 355,188" stroke="#38bdf8" stroke-width="0.6" opacity="0.2" fill="none"/>
  </g>
</svg>
