<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <radialGradient id="ag" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0f0f11" stop-opacity="0"/>
    </radialGradient>
    <filter id="ag1">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="#0f0f11"/>
  <rect width="400" height="300" fill="url(#ag)"/>

  <!-- Neural layers -->
  <g opacity="0.5">
    <!-- Layer 1 -->
    <circle cx="80" cy="80" r="4" fill="#6366f1" opacity="0.7"/>
    <circle cx="80" cy="140" r="4" fill="#6366f1" opacity="0.5"/>
    <circle cx="80" cy="200" r="4" fill="#6366f1" opacity="0.6"/>
    <circle cx="80" cy="260" r="4" fill="#6366f1" opacity="0.4"/>

    <!-- Layer 2 -->
    <circle cx="160" cy="100" r="5" fill="#818cf8" opacity="0.7"/>
    <circle cx="160" cy="170" r="5" fill="#818cf8" opacity="0.8"/>
    <circle cx="160" cy="240" r="5" fill="#818cf8" opacity="0.6"/>

    <!-- Layer 3 -->
    <circle cx="240" cy="110" r="5" fill="#818cf8" opacity="0.6"/>
    <circle cx="240" cy="180" r="5" fill="#818cf8" opacity="0.7"/>
    <circle cx="240" cy="250" r="5" fill="#818cf8" opacity="0.5"/>

    <!-- Layer 4 (output) -->
    <circle cx="320" cy="130" r="6" fill="#06b6d4" opacity="0.8"/>
    <circle cx="320" cy="210" r="6" fill="#06b6d4" opacity="0.6"/>
  </g>

  <!-- Connections L1-L2 -->
  <g stroke="#6366f1" stroke-width="0.5" opacity="0.12">
    <line x1="80" y1="80" x2="160" y2="100"/><line x1="80" y1="80" x2="160" y2="170"/>
    <line x1="80" y1="140" x2="160" y2="100"/><line x1="80" y1="140" x2="160" y2="170"/><line x1="80" y1="140" x2="160" y2="240"/>
    <line x1="80" y1="200" x2="160" y2="170"/><line x1="80" y1="200" x2="160" y2="240"/>
    <line x1="80" y1="260" x2="160" y2="240"/><line x1="80" y1="260" x2="160" y2="170"/>
  </g>

  <!-- Connections L2-L3 -->
  <g stroke="#818cf8" stroke-width="0.5" opacity="0.12">
    <line x1="160" y1="100" x2="240" y2="110"/><line x1="160" y1="100" x2="240" y2="180"/>
    <line x1="160" y1="170" x2="240" y2="110"/><line x1="160" y1="170" x2="240" y2="180"/><line x1="160" y1="170" x2="240" y2="250"/>
    <line x1="160" y1="240" x2="240" y2="180"/><line x1="160" y1="240" x2="240" y2="250"/>
  </g>

  <!-- Connections L3-L4 -->
  <g stroke="#06b6d4" stroke-width="0.5" opacity="0.15">
    <line x1="240" y1="110" x2="320" y2="130"/><line x1="240" y1="110" x2="320" y2="210"/>
    <line x1="240" y1="180" x2="320" y2="130"/><line x1="240" y1="180" x2="320" y2="210"/>
    <line x1="240" y1="250" x2="320" y2="210"/>
  </g>

  <!-- Pulse effect on active connection -->
  <line x1="160" y1="170" x2="240" y2="180" stroke="#818cf8" stroke-width="1.5" opacity="0.3" filter="url(#ag1)"/>
  <line x1="240" y1="180" x2="320" y2="130" stroke="#06b6d4" stroke-width="1.5" opacity="0.25" filter="url(#ag1)"/>
</svg>
