<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" fill="none">
  <rect width="600" height="240" fill="#0a0a10"/>
  <!-- Alert-style monitor -->
  <g opacity="0.6">
    <!-- Chart line -->
    <polyline points="40,180 80,175 120,160 160,155 200,140 240,145 280,130 320,110 360,95 400,100 440,115 480,105 520,90 560,85"
      stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Range band -->
    <rect x="40" y="100" width="520" height="60" fill="#f59e0b" opacity="0.03" rx="2"/>
    <line x1="40" y1="100" x2="560" y2="100" stroke="#f59e0b" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 4"/>
    <line x1="40" y1="160" x2="560" y2="160" stroke="#f59e0b" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 4"/>
    <!-- Alert point (price leaving range) -->
    <circle cx="520" cy="90" r="8" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
    <circle cx="520" cy="90" r="3" fill="#ef4444" opacity="0.8"/>
    <!-- Alert label -->
    <rect x="470" y="60" width="100" height="20" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="520" y="74" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle" opacity="0.8">REBALANCE</text>
  </g>
  <!-- Labels -->
  <text x="30" y="105" font-family="monospace" font-size="7" fill="#f59e0b" opacity="0.3">MAX</text>
  <text x="30" y="165" font-family="monospace" font-size="7" fill="#f59e0b" opacity="0.3">MIN</text>
  <text x="300" y="220" font-family="monospace" font-size="8" fill="#f59e0b" opacity="0.2">USDC / JPYC</text>
</svg>
