<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" fill="#0c0810"/>
  <defs>
    <radialGradient id="ag2" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0c0810" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="240" fill="url(#ag2)"/>
  <!-- Chat bubbles -->
  <g opacity="0.6">
    <!-- User question -->
    <rect x="160" y="40" width="200" height="32" rx="12" fill="#a855f7" opacity="0.12"/>
    <text x="260" y="61" font-family="sans-serif" font-size="9" fill="#c084fc" text-anchor="middle" opacity="0.7">あなたは現場にいましたか？</text>
    <!-- AI response -->
    <rect x="40" y="90" width="240" height="32" rx="12" fill="#ffffff" opacity="0.04"/>
    <text x="160" y="111" font-family="sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle" opacity="0.6">はい、ですが...少し記憶が曖昧で</text>
    <!-- User follow-up -->
    <rect x="120" y="140" width="240" height="32" rx="12" fill="#a855f7" opacity="0.12"/>
    <text x="240" y="161" font-family="sans-serif" font-size="9" fill="#c084fc" text-anchor="middle" opacity="0.7">矛盾していますね。証拠Aを見てください</text>
    <!-- AI caught -->
    <rect x="40" y="190" width="180" height="32" rx="12" fill="#ffffff" opacity="0.04"/>
    <text x="130" y="211" font-family="sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" opacity="0.6">...！</text>
  </g>
</svg>
