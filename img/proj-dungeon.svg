<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" fill="#0a0a08"/>
  <!-- Dungeon grid -->
  <g stroke="#84cc16" stroke-width="0.3" opacity="0.1">
    <line x1="60" y1="40" x2="60" y2="200"/><line x1="100" y1="40" x2="100" y2="200"/>
    <line x1="140" y1="40" x2="140" y2="200"/><line x1="180" y1="40" x2="180" y2="200"/>
    <line x1="220" y1="40" x2="220" y2="200"/><line x1="260" y1="40" x2="260" y2="200"/>
    <line x1="300" y1="40" x2="300" y2="200"/><line x1="340" y1="40" x2="340" y2="200"/>
    <line x1="60" y1="40" x2="340" y2="40"/><line x1="60" y1="80" x2="340" y2="80"/>
    <line x1="60" y1="120" x2="340" y2="120"/><line x1="60" y1="160" x2="340" y2="160"/>
    <line x1="60" y1="200" x2="340" y2="200"/>
  </g>
  <!-- Walls (filled cells) -->
  <g fill="#84cc16" opacity="0.06">
    <rect x="60" y="40" width="40" height="40"/><rect x="100" y="40" width="40" height="40"/>
    <rect x="260" y="40" width="40" height="40"/><rect x="300" y="40" width="40" height="40"/>
    <rect x="60" y="80" width="40" height="40"/>
    <rect x="300" y="80" width="40" height="40"/>
    <rect x="60" y="160" width="40" height="40"/>
    <rect x="260" y="160" width="40" height="40"/><rect x="300" y="160" width="40" height="40"/>
  </g>
  <!-- Path (player route) -->
  <polyline points="200,60 200,100 160,100 160,140 200,140 240,140 240,180"
    stroke="#84cc16" stroke-width="1.5" opacity="0.3" fill="none" stroke-dasharray="4 4"/>
  <!-- Player -->
  <circle cx="240" cy="180" r="5" fill="#84cc16" opacity="0.5"/>
  <!-- Code overlay -->
  <g font-family="monospace" font-size="7" fill="#84cc16" opacity="0.15">
    <text x="65" y="230">module dungeon::defense {</text>
    <text x="80" y="238">public fun place_trap(pos: u64)</text>
  </g>
</svg>
