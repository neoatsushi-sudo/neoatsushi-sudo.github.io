<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="400" y2="200">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="range" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#0f0f11"/>
  <rect width="400" height="200" fill="url(#dg)"/>

  <!-- LP Range band -->
  <rect x="100" y="40" width="200" height="120" fill="url(#range)" rx="4"/>

  <!-- Price curve (concentrated liquidity shape) -->
  <path d="M 40 160 Q 80 155 120 140 Q 160 110 200 80 Q 240 60 260 58 Q 280 60 300 80 Q 340 120 380 155"
        stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>

  <!-- Current price line -->
  <line x1="210" y1="30" x2="210" y2="175" stroke="#06b6d4" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>
  <circle cx="210" cy="75" r="3" fill="#06b6d4" opacity="0.8"/>

  <!-- Range boundaries -->
  <line x1="130" y1="35" x2="130" y2="170" stroke="#6366f1" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 3"/>
  <line x1="290" y1="35" x2="290" y2="170" stroke="#6366f1" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Labels -->
  <text x="130" y="185" font-family="monospace" font-size="8" fill="#6366f1" opacity="0.5" text-anchor="middle">MIN</text>
  <text x="290" y="185" font-family="monospace" font-size="8" fill="#6366f1" opacity="0.5" text-anchor="middle">MAX</text>
  <text x="210" y="22" font-family="monospace" font-size="7" fill="#06b6d4" opacity="0.6" text-anchor="middle">PRICE</text>

  <!-- Tick marks -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.06">
    <line x1="60" y1="170" x2="60" y2="175"/>
    <line x1="100" y1="170" x2="100" y2="175"/>
    <line x1="140" y1="170" x2="140" y2="175"/>
    <line x1="180" y1="170" x2="180" y2="175"/>
    <line x1="220" y1="170" x2="220" y2="175"/>
    <line x1="260" y1="170" x2="260" y2="175"/>
    <line x1="300" y1="170" x2="300" y2="175"/>
    <line x1="340" y1="170" x2="340" y2="175"/>
  </g>
</svg>
