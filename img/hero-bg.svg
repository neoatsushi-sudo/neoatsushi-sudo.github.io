<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="70%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="#050505"/>
  <rect width="1200" height="800" fill="url(#g1)"/>
  <rect width="1200" height="800" fill="url(#g2)"/>

  <!-- Network nodes -->
  <g filter="url(#glow)" opacity="0.6">
    <!-- Central cluster -->
    <circle cx="600" cy="380" r="3" fill="#6366f1"/>
    <circle cx="540" cy="340" r="2" fill="#818cf8"/>
    <circle cx="660" cy="350" r="2.5" fill="#818cf8"/>
    <circle cx="580" cy="420" r="2" fill="#6366f1"/>
    <circle cx="640" cy="430" r="1.5" fill="#818cf8"/>
    <circle cx="520" cy="400" r="1.5" fill="#6366f1"/>
    <circle cx="700" cy="390" r="2" fill="#6366f1"/>

    <!-- Outer nodes -->
    <circle cx="420" cy="280" r="1.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="780" cy="300" r="1.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="460" cy="480" r="1" fill="#818cf8" opacity="0.4"/>
    <circle cx="740" cy="460" r="1" fill="#818cf8" opacity="0.4"/>
    <circle cx="350" cy="360" r="1" fill="#6366f1" opacity="0.3"/>
    <circle cx="850" cy="380" r="1" fill="#6366f1" opacity="0.3"/>
    <circle cx="500" cy="240" r="1" fill="#06b6d4" opacity="0.3"/>
    <circle cx="700" cy="260" r="1" fill="#06b6d4" opacity="0.3"/>
    <circle cx="380" cy="440" r="0.8" fill="#818cf8" opacity="0.2"/>
    <circle cx="820" cy="440" r="0.8" fill="#818cf8" opacity="0.2"/>
  </g>

  <!-- Connections -->
  <g stroke="#6366f1" stroke-width="0.5" opacity="0.15">
    <line x1="600" y1="380" x2="540" y2="340"/>
    <line x1="600" y1="380" x2="660" y2="350"/>
    <line x1="600" y1="380" x2="580" y2="420"/>
    <line x1="600" y1="380" x2="640" y2="430"/>
    <line x1="600" y1="380" x2="700" y2="390"/>
    <line x1="540" y1="340" x2="520" y2="400"/>
    <line x1="540" y1="340" x2="420" y2="280"/>
    <line x1="660" y1="350" x2="780" y2="300"/>
    <line x1="660" y1="350" x2="700" y2="390"/>
    <line x1="580" y1="420" x2="460" y2="480"/>
    <line x1="640" y1="430" x2="740" y2="460"/>
    <line x1="520" y1="400" x2="350" y2="360"/>
    <line x1="700" y1="390" x2="850" y2="380"/>
    <line x1="540" y1="340" x2="500" y2="240"/>
    <line x1="660" y1="350" x2="700" y2="260"/>
    <line x1="520" y1="400" x2="380" y2="440"/>
    <line x1="700" y1="390" x2="820" y2="440"/>
  </g>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.02">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
  </g>
</svg>
