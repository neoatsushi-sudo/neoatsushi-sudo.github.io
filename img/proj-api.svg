<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" fill="none">
  <rect width="600" height="240" fill="#0a0f0a"/>
  <defs>
    <linearGradient id="pa" x1="0" y1="0" x2="600" y2="240">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="240" fill="url(#pa)"/>
  <!-- API request flow -->
  <g opacity="0.7">
    <!-- Request -->
    <rect x="40" y="80" width="120" height="36" rx="6" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <text x="100" y="103" font-family="monospace" font-size="10" fill="#22c55e" text-anchor="middle" opacity="0.7">POST /extract</text>
    <!-- Arrow -->
    <line x1="170" y1="98" x2="230" y2="98" stroke="#22c55e" stroke-width="0.8" opacity="0.3"/>
    <polygon points="228,94 236,98 228,102" fill="#22c55e" opacity="0.3"/>
    <!-- Server -->
    <rect x="240" y="68" width="120" height="60" rx="8" fill="#22c55e" stroke="none" opacity="0.06"/>
    <text x="300" y="95" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle" opacity="0.5">ai-api</text>
    <text x="300" y="112" font-family="monospace" font-size="7" fill="#4ade80" text-anchor="middle" opacity="0.35">x402 • USDC</text>
    <!-- Arrow out -->
    <line x1="370" y1="98" x2="430" y2="98" stroke="#4ade80" stroke-width="0.8" opacity="0.3"/>
    <polygon points="428,94 436,98 428,102" fill="#4ade80" opacity="0.3"/>
    <!-- Response -->
    <rect x="440" y="80" width="120" height="36" rx="6" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.4"/>
    <text x="500" y="103" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle" opacity="0.7">200 JSON</text>
  </g>
  <!-- Endpoint list faded -->
  <g font-family="monospace" font-size="8" fill="#22c55e" opacity="0.2">
    <text x="60" y="170">/finance</text>
    <text x="160" y="170">/weather</text>
    <text x="260" y="170">/news</text>
    <text x="340" y="170">/geocode</text>
    <text x="440" y="170">/extract</text>
  </g>
</svg>
