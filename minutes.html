<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>議事録 → タスク変換ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.6rem; color: #fff; margin-bottom: 8px; }
    .subtitle { color: #8892a4; font-size: 0.9rem; margin-bottom: 36px; }
    .back-link {
      display: inline-block;
      color: #5ba3f5;
      font-size: 0.85rem;
      text-decoration: none;
      margin-bottom: 24px;
    }
    .back-link:hover { text-decoration: underline; }
    .card {
      background: #1a1f2e;
      border: 1px solid #2a2f3e;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 0.95rem;
      color: #5ba3f5;
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2a2f3e;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 14px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      resize: vertical;
      min-height: 220px;
      line-height: 1.7;
    }
    textarea:focus { border-color: #5ba3f5; }
    .sample-btn {
      margin-top: 10px;
      background: none;
      border: 1px dashed #2a2f3e;
      color: #8892a4;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: border-color 0.2s;
    }
    .sample-btn:hover { border-color: #5ba3f5; color: #5ba3f5; }
    .btn-generate {
      width: 100%;
      background: #1e3a5f;
      color: #5ba3f5;
      border: 1px solid #2a5a9f;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 20px;
    }
    .btn-generate:hover { background: #2a4a7f; }

    /* タスク一覧 */
    .result-container { display: none; }
    .result-container.visible { display: block; }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .result-header h2 {
      font-size: 0.95rem;
      color: #5ba3f5;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .btn-copy, .btn-export {
      background: none;
      border: 1px solid #2a2f3e;
      color: #8892a4;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.2s;
      margin-left: 8px;
    }
    .btn-copy:hover, .btn-export:hover {
      border-color: #5ba3f5;
      color: #5ba3f5;
    }
    .task-list { list-style: none; }
    .task-item {
      background: #0f1117;
      border: 1px solid #2a2f3e;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .task-item:hover { border-color: #3a4050; }
    .task-check {
      width: 18px;
      height: 18px;
      border: 2px solid #2a5a9f;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .task-check.checked {
      background: #2a5a9f;
    }
    .task-check.checked::after {
      content: '✓';
      color: #fff;
      font-size: 11px;
    }
    .task-body { flex: 1; }
    .task-text {
      font-size: 0.95rem;
      color: #e0e0e0;
      line-height: 1.5;
    }
    .task-text.done {
      text-decoration: line-through;
      color: #4a5060;
    }
    .task-meta {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .tag-person {
      background: #1e3a5f;
      color: #5ba3f5;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.75rem;
    }
    .tag-deadline {
      background: #2a1f0f;
      color: #f5a623;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.75rem;
    }
    .tag-priority {
      background: #2a0f0f;
      color: #ff6b6b;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.75rem;
    }
    .summary-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #8892a4;
    }
    .summary-bar span { color: #e0e0e0; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← ポートフォリオに戻る</a>
  <h1>議事録 → タスク変換ツール</h1>
  <p class="subtitle">会議メモを貼り付けるとタスク一覧に自動整理します。</p>

  <div class="card">
    <h2>議事録を貼り付け</h2>
    <textarea id="minutesInput" placeholder="会議メモや議事録をここに貼り付けてください...

例：
・田中さんが資料を作成する（期限：3/15）
・鈴木さんが取引先へ連絡する ※重要
・次回ミーティングの日程を確認する
・見積書を送付する（担当：山田）"></textarea>
    <button class="sample-btn" onclick="loadSample()">サンプルを表示</button>
  </div>

  <button class="btn-generate" onclick="convertToTasks()">タスクに変換</button>

  <!-- 結果 -->
  <div class="result-container card" id="resultContainer">
    <div class="result-header">
      <h2>タスク一覧</h2>
      <div>
        <button class="btn-copy" onclick="copyTasks()">コピー</button>
        <button class="btn-export" onclick="exportMarkdown()">Markdown出力</button>
      </div>
    </div>
    <div class="summary-bar">
      <div>合計: <span id="totalCount">0</span> 件</div>
      <div>完了: <span id="doneCount">0</span> 件</div>
      <div>未完了: <span id="pendingCount">0</span> 件</div>
    </div>
    <ul class="task-list" id="taskList"></ul>
  </div>
</div>

<script>
  const SAMPLE = `・田中さんが企画書を作成する（期限：3月15日）
・鈴木部長へ予算の承認をもらう ※重要
・取引先へ見積書を送付する（担当：山田）
・次回ミーティングの日程を調整する（期限：今週中）
・Webサイトのデザイン修正を依頼する
・請求書の確認と経理への提出 ※至急
・新機能の仕様書を作成して共有する（担当：開発チーム）
・顧客アンケートの集計を行う`;

  function loadSample() {
    document.getElementById('minutesInput').value = SAMPLE;
  }

  function convertToTasks() {
    const input = document.getElementById('minutesInput').value.trim();
    if (!input) { alert('議事録を入力してください。'); return; }

    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tasks = [];

    lines.forEach(line => {
      // 行頭記号を除去
      let text = line.replace(/^[・\-\*\•\◆\◇\▶\►\→\>\#\d+\.\d+\)]+\s*/, '').trim();
      if (!text) return;

      // 担当者を抽出（〇〇さん、担当：〇〇）
      let person = '';
      const personMatch = text.match(/担当[：:]\s*([^\s　（(）)、,。\.]+)/) ||
                          text.match(/([^\s　（(）)、,。\.]{2,4})(さん|部長|課長|さま|様)/);
      if (personMatch) {
        person = personMatch[1] + (personMatch[2] || '');
      }

      // 期限を抽出
      let deadline = '';
      const deadlineMatch = text.match(/期限[：:]\s*([^\s　（(）)、,。]+)/) ||
                            text.match(/([今来再]\w{0,3}中|[0-9０-９]+月[0-9０-９]*日?|\d+\/\d+)/);
      if (deadlineMatch) {
        deadline = deadlineMatch[1] || deadlineMatch[0];
      }

      // 優先度を判定
      const isUrgent = /重要|至急|緊急|必須|priority|urgent/i.test(text);

      // タグ表記を除去してクリーンなタスクテキストに
      let cleanText = text
        .replace(/（期限[：:][^）]*）/g, '')
        .replace(/\(期限[：:][^)]*\)/g, '')
        .replace(/担当[：:][^\s　（(）)、,。]*/g, '')
        .replace(/[※\*]\s*(重要|至急|緊急)/g, '')
        .replace(/\s{2,}/g, ' ')
        .trim();

      tasks.push({ text: cleanText, person, deadline, isUrgent, done: false });
    });

    renderTasks(tasks);
  }

  let taskData = [];

  function renderTasks(tasks) {
    taskData = tasks;
    const list = document.getElementById('taskList');
    list.innerHTML = '';

    tasks.forEach((task, i) => {
      const li = document.createElement('li');
      li.className = 'task-item';
      li.innerHTML = `
        <div class="task-check" id="check-${i}" onclick="toggleDone(${i})"></div>
        <div class="task-body">
          <div class="task-text" id="text-${i}">${escHtml(task.text)}</div>
          <div class="task-meta">
            ${task.person ? `<span class="tag-person">&#128100; ${escHtml(task.person)}</span>` : ''}
            ${task.deadline ? `<span class="tag-deadline">&#128197; ${escHtml(task.deadline)}</span>` : ''}
            ${task.isUrgent ? `<span class="tag-priority">&#9888; 重要</span>` : ''}
          </div>
        </div>`;
      list.appendChild(li);
    });

    updateSummary();
    document.getElementById('resultContainer').classList.add('visible');
    document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
  }

  function toggleDone(i) {
    taskData[i].done = !taskData[i].done;
    const check = document.getElementById('check-' + i);
    const text = document.getElementById('text-' + i);
    check.classList.toggle('checked', taskData[i].done);
    text.classList.toggle('done', taskData[i].done);
    updateSummary();
  }

  function updateSummary() {
    const total = taskData.length;
    const done = taskData.filter(t => t.done).length;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('pendingCount').textContent = total - done;
  }

  function copyTasks() {
    const lines = taskData.map(t => {
      let line = '[ ] ' + t.text;
      if (t.person) line += '  担当: ' + t.person;
      if (t.deadline) line += '  期限: ' + t.deadline;
      if (t.isUrgent) line += '  ⚠ 重要';
      return line;
    });
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      alert('コピーしました！');
    });
  }

  function exportMarkdown() {
    const lines = ['# タスク一覧\n'];
    taskData.forEach(t => {
      let line = '- [ ] ' + t.text;
      const tags = [];
      if (t.person) tags.push('担当: ' + t.person);
      if (t.deadline) tags.push('期限: ' + t.deadline);
      if (t.isUrgent) tags.push('**重要**');
      if (tags.length) line += ' (' + tags.join(' / ') + ')';
      lines.push(line);
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tasks.md';
    a.click();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
