<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請求書自動生成ツール</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 {
      font-size: 1.6rem;
      color: #fff;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #8892a4;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }
    .card {
      background: #1a1f2e;
      border: 1px solid #2a2f3e;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 0.95rem;
      color: #5ba3f5;
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 0.82rem;
      color: #8892a4;
    }
    input, textarea, select {
      background: #0f1117;
      border: 1px solid #2a2f3e;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 9px 12px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #5ba3f5;
    }
    textarea { resize: vertical; min-height: 70px; }

    .items-table { width: 100%; border-collapse: collapse; }
    .items-table th {
      text-align: left;
      font-size: 0.78rem;
      color: #8892a4;
      padding: 6px 8px;
      border-bottom: 1px solid #2a2f3e;
    }
    .items-table td { padding: 6px 4px; }
    .items-table input { width: 100%; }
    .item-qty { width: 70px; }
    .item-price { width: 110px; }
    .item-total {
      width: 110px;
      color: #8892a4;
      font-size: 0.88rem;
      padding: 9px 12px;
    }
    .btn-add-row {
      margin-top: 12px;
      background: none;
      border: 1px dashed #2a2f3e;
      color: #5ba3f5;
      border-radius: 6px;
      padding: 7px 18px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    .btn-add-row:hover { border-color: #5ba3f5; }
    .btn-remove {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
    }

    .total-section {
      margin-top: 16px;
      border-top: 1px solid #2a2f3e;
      padding-top: 14px;
    }
    .total-row {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: #8892a4;
    }
    .total-row.grand {
      font-size: 1.1rem;
      color: #fff;
      font-weight: bold;
    }
    .total-row span:last-child { min-width: 120px; text-align: right; }

    .btn-generate {
      width: 100%;
      background: #1e3a5f;
      color: #5ba3f5;
      border: 1px solid #2a5a9f;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-generate:hover { background: #2a4a7f; }

    @media (max-width: 520px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>請求書自動生成ツール</h1>
  <p class="subtitle">フォームに入力してPDFを生成・ダウンロードできます。</p>

  <!-- 基本情報 -->
  <div class="card">
    <h2>基本情報</h2>
    <div class="form-row">
      <div class="form-group">
        <label>請求番号</label>
        <input type="text" id="invoiceNo" placeholder="例: INV-2026-001">
      </div>
      <div class="form-group">
        <label>発行日</label>
        <input type="date" id="issueDate">
      </div>
      <div class="form-group">
        <label>支払期限</label>
        <input type="date" id="dueDate">
      </div>
    </div>
  </div>

  <!-- 請求先 -->
  <div class="card">
    <h2>請求先</h2>
    <div class="form-row">
      <div class="form-group full">
        <label>会社名・お名前</label>
        <input type="text" id="clientName" placeholder="例: 株式会社サンプル">
      </div>
      <div class="form-group full">
        <label>住所（任意）</label>
        <input type="text" id="clientAddress" placeholder="例: 東京都渋谷区〇〇1-2-3">
      </div>
    </div>
  </div>

  <!-- 請求者 -->
  <div class="card">
    <h2>請求者（自分の情報）</h2>
    <div class="form-row">
      <div class="form-group full">
        <label>氏名・屋号</label>
        <input type="text" id="senderName" placeholder="例: 田中 太郎">
      </div>
      <div class="form-group full">
        <label>住所</label>
        <input type="text" id="senderAddress" placeholder="例: 大阪府大阪市〇〇2-3-4">
      </div>
      <div class="form-group">
        <label>電話番号（任意）</label>
        <input type="text" id="senderTel" placeholder="例: 090-0000-0000">
      </div>
      <div class="form-group">
        <label>メール（任意）</label>
        <input type="text" id="senderEmail" placeholder="例: sample@email.com">
      </div>
    </div>
  </div>

  <!-- 明細 -->
  <div class="card">
    <h2>明細</h2>
    <table class="items-table">
      <thead>
        <tr>
          <th>品目・サービス名</th>
          <th>数量</th>
          <th>単価（円）</th>
          <th>小計</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="itemsBody">
        <tr>
          <td><input type="text" class="item-name" placeholder="例: Webサイト制作"></td>
          <td><input type="number" class="item-qty item-qty" value="1" min="1"></td>
          <td><input type="number" class="item-price" placeholder="50000" min="0"></td>
          <td class="item-total">¥0</td>
          <td><button class="btn-remove" onclick="removeRow(this)">✕</button></td>
        </tr>
      </tbody>
    </table>
    <button class="btn-add-row" onclick="addRow()">＋ 行を追加</button>

    <div class="total-section">
      <div class="total-row"><span>小計</span><span id="subtotal">¥0</span></div>
      <div class="total-row">
        <span>消費税
          <select id="taxRate" style="margin-left:8px;padding:3px 6px;font-size:0.82rem;">
            <option value="0.10">10%</option>
            <option value="0.08">8%</option>
            <option value="0">非課税</option>
          </select>
        </span>
        <span id="taxAmount">¥0</span>
      </div>
      <div class="total-row grand"><span>合計</span><span id="grandTotal">¥0</span></div>
    </div>
  </div>

  <!-- 備考 -->
  <div class="card">
    <h2>備考（任意）</h2>
    <textarea id="notes" placeholder="例: お振込先&#10;銀行名: 〇〇銀行&#10;支店名: 〇〇支店&#10;口座番号: 普通 1234567&#10;口座名義: タナカ タロウ"></textarea>
  </div>

  <button class="btn-generate" onclick="generatePDF()">PDFを生成してダウンロード</button>
</div>

<script>
  // 今日の日付をセット
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  document.getElementById('issueDate').value = fmt(today);
  const due = new Date(today); due.setDate(due.getDate() + 30);
  document.getElementById('dueDate').value = fmt(due);
  document.getElementById('invoiceNo').value = 'INV-' + today.getFullYear() + '-001';

  function addRow() {
    const tbody = document.getElementById('itemsBody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" class="item-name" placeholder="品目名"></td>
      <td><input type="number" class="item-qty" value="1" min="1"></td>
      <td><input type="number" class="item-price" placeholder="0" min="0"></td>
      <td class="item-total">¥0</td>
      <td><button class="btn-remove" onclick="removeRow(this)">✕</button></td>`;
    tbody.appendChild(tr);
    attachListeners(tr);
    calcTotal();
  }

  function removeRow(btn) {
    const rows = document.querySelectorAll('#itemsBody tr');
    if (rows.length > 1) { btn.closest('tr').remove(); calcTotal(); }
  }

  function attachListeners(row) {
    row.querySelectorAll('input').forEach(i => i.addEventListener('input', calcTotal));
  }

  document.querySelectorAll('#itemsBody tr').forEach(attachListeners);
  document.getElementById('taxRate').addEventListener('change', calcTotal);

  function calcTotal() {
    let subtotal = 0;
    document.querySelectorAll('#itemsBody tr').forEach(row => {
      const qty = parseFloat(row.querySelector('.item-qty')?.value) || 0;
      const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
      const total = qty * price;
      row.querySelector('.item-total').textContent = '¥' + total.toLocaleString();
      subtotal += total;
    });
    const taxRate = parseFloat(document.getElementById('taxRate').value);
    const tax = Math.floor(subtotal * taxRate);
    const grand = subtotal + tax;
    document.getElementById('subtotal').textContent = '¥' + subtotal.toLocaleString();
    document.getElementById('taxAmount').textContent = '¥' + tax.toLocaleString();
    document.getElementById('grandTotal').textContent = '¥' + grand.toLocaleString();
  }

  function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

    // フォント設定（日本語対応）
    doc.setFont('helvetica');

    const invoiceNo   = document.getElementById('invoiceNo').value || 'INV-001';
    const issueDate   = document.getElementById('issueDate').value;
    const dueDate     = document.getElementById('dueDate').value;
    const clientName  = document.getElementById('clientName').value || '（未入力）';
    const clientAddr  = document.getElementById('clientAddress').value;
    const senderName  = document.getElementById('senderName').value || '（未入力）';
    const senderAddr  = document.getElementById('senderAddress').value;
    const senderTel   = document.getElementById('senderTel').value;
    const senderEmail = document.getElementById('senderEmail').value;
    const notes       = document.getElementById('notes').value;

    const taxRate   = parseFloat(document.getElementById('taxRate').value);
    let subtotal = 0;
    const tableRows = [];
    document.querySelectorAll('#itemsBody tr').forEach(row => {
      const name  = row.querySelector('.item-name')?.value || '';
      const qty   = parseFloat(row.querySelector('.item-qty')?.value) || 0;
      const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
      const total = qty * price;
      subtotal += total;
      tableRows.push([name, qty, '¥' + price.toLocaleString(), '¥' + total.toLocaleString()]);
    });
    const tax   = Math.floor(subtotal * taxRate);
    const grand = subtotal + tax;

    // タイトル
    doc.setFontSize(22);
    doc.setTextColor(30, 30, 30);
    doc.text('Invoice', 105, 22, { align: 'center' });

    // 請求番号・日付
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('No: ' + invoiceNo, 160, 15);
    doc.text('Issue: ' + issueDate, 160, 20);
    doc.text('Due:   ' + dueDate,  160, 25);

    // 区切り線
    doc.setDrawColor(200);
    doc.line(15, 30, 195, 30);

    // 請求先
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('Bill To:', 15, 38);
    doc.setFontSize(12);
    doc.setTextColor(30);
    doc.text(clientName, 15, 44);
    if (clientAddr) { doc.setFontSize(9); doc.setTextColor(100); doc.text(clientAddr, 15, 50); }

    // 請求者
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('From:', 130, 38);
    doc.setFontSize(11);
    doc.setTextColor(30);
    doc.text(senderName, 130, 44);
    doc.setFontSize(9);
    doc.setTextColor(100);
    let sy = 50;
    if (senderAddr)  { doc.text(senderAddr,  130, sy); sy += 5; }
    if (senderTel)   { doc.text('Tel: ' + senderTel,   130, sy); sy += 5; }
    if (senderEmail) { doc.text('Email: ' + senderEmail, 130, sy); }

    // 明細テーブル
    doc.autoTable({
      startY: 65,
      head: [['Description', 'Qty', 'Unit Price', 'Amount']],
      body: tableRows,
      styles: { fontSize: 10, cellPadding: 4 },
      headStyles: { fillColor: [30, 58, 95], textColor: 255 },
      columnStyles: {
        0: { cellWidth: 90 },
        1: { cellWidth: 20, halign: 'center' },
        2: { cellWidth: 35, halign: 'right' },
        3: { cellWidth: 35, halign: 'right' },
      },
      margin: { left: 15, right: 15 },
    });

    const finalY = doc.lastAutoTable.finalY + 6;

    // 合計
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text('Subtotal:', 140, finalY);
    doc.text('¥' + subtotal.toLocaleString(), 193, finalY, { align: 'right' });

    const taxLabel = taxRate === 0 ? 'Tax (none):' : 'Tax (' + (taxRate * 100) + '%):';
    doc.text(taxLabel, 140, finalY + 6);
    doc.text('¥' + tax.toLocaleString(), 193, finalY + 6, { align: 'right' });

    doc.setDrawColor(180);
    doc.line(130, finalY + 9, 195, finalY + 9);

    doc.setFontSize(13);
    doc.setTextColor(30);
    doc.text('Total:', 140, finalY + 16);
    doc.text('¥' + grand.toLocaleString(), 193, finalY + 16, { align: 'right' });

    // 備考
    if (notes) {
      doc.setFontSize(9);
      doc.setTextColor(100);
      doc.text('Notes:', 15, finalY + 28);
      doc.setTextColor(60);
      const lines = doc.splitTextToSize(notes, 160);
      doc.text(lines, 15, finalY + 34);
    }

    // フッター
    doc.setFontSize(8);
    doc.setTextColor(180);
    doc.text('Generated by neoatsushi-sudo.github.io', 105, 290, { align: 'center' });

    doc.save('invoice_' + invoiceNo + '.pdf');
  }
</script>
</body>
</html>
